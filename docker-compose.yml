services:
  ollama:
    image: ollama/ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  gateway:
    build: ./api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://gateway:${DB_PASSWORD:-changeme}@postgres:5432/gateway
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_example}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_example}
      - ADMIN_SECRET=${ADMIN_SECRET:-change_me_in_production}
      - DOMAIN=${DOMAIN:-api.exemple.com}
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build: ./api
    command: python -m app.worker
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://gateway:${DB_PASSWORD:-changeme}@postgres:5432/gateway
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_example}
    volumes:
      - ./api:/app
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=gateway
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  redis_data:
  caddy_data:
